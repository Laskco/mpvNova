name: build

on:
  - push
  - pull_request
  - workflow_dispatch

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Fix Gradle permission
        run: chmod +x gradlew

      - uses: gradle/actions/setup-gradle@v5

      - name: Verify bundled native libraries
        run: |
          set -euo pipefail
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            for lib in libplayer.so libmpv.so libavformat.so libavcodec.so libc++_shared.so; do
              test -f "app/src/main/jniLibs/$abi/$lib"
            done
          done

      - name: Verify Android build
        run: ./gradlew :app:assemble

      - name: Upload release APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-apks
          if-no-files-found: error
          path: |
            app/build/outputs/apk/default/release/app-default-*-release.apk
            app/build/outputs/apk/api29/release/app-api29-universal-release.apk
            app/build/outputs/apk/api29/debug/app-api29-universal-debug.apk
